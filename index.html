<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exoplanet Catalog</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="stars"></div>

  <div class="container">

    <header class="top">
      <p class="tag">NASA Exoplanet Archive</p>

      <h1>
        Exoplanet <span>Catalog</span>
      </h1>

      <p class="desc">
        Exploring planets beyond our solar system.
      </p>

      <button id="theme-toggle">🌙</button>
    </header>

    <div class="controls">

      <div class="search-box">
        <input
          type="text"
          id="search"
          placeholder="Search planet..."
        >
        <button id="search-btn">Search</button>
      </div>

      <div class="filters">

        <select id="year">
          <option value="">All Years</option>
          <option value="0-1995">0 - 1995</option>
          <option value="1995-2000">1995 - 2000</option>
          <option value="2000-2005">2000 - 2005</option>
          <option value="2005-2010">2005 - 2010</option>
          <option value="2010-2015">2010 - 2015</option>
          <option value="2015-2020">2015 - 2020</option>
          <option value="2020-2025">2020 - 2025</option>
          <option value="2025-2026">2025 - 2026</option>
        </select>

        <select id="sort">
          <option value="">Sort</option>
          <option value="year-asc">Oldest</option>
          <option value="year-desc">Newest</option>
        </select>

        <button id="reset">Reset</button>

      </div>

      <p id="count"></p>

    </div>

    <main>

      <div id="loader">
        <p>Loading planets...</p>
      </div>

      <div id="grid" class="hidden"></div>

    </main>

    <footer>
      <p>Data from NASA Exoplanet Archive</p>
    </footer>

  </div>

  <script src="script.js"></script>

</body>

</html>
